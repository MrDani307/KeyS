<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Daniil Premium | Key System</title>
    <style>
        :root { --primary: #00ffa3; --bg: #050505; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        
        body { 
            background: var(--bg); 
            background-image: radial-gradient(circle at 50% -20%, #1a1a1a, #050505);
            color: white; font-family: 'Segoe UI', Roboto, sans-serif; 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; margin: 0; overflow: hidden;
        }

        .glass-card { 
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            padding: 40px 30px; border-radius: 35px;
            border: 1px solid rgba(255, 255, 255, 0.1); 
            text-align: center; width: 90%; max-width: 350px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5), inset 0 0 20px rgba(255,255,255,0.02);
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        h2 { 
            font-weight: 800; letter-spacing: 4px; margin: 0; font-size: 22px; 
            text-transform: uppercase; background: linear-gradient(to bottom, #fff, #888);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .status-dot { width: 8px; height: 8px; background: var(--primary); border-radius: 50%; display: inline-block; margin-right: 5px; box-shadow: 0 0 10px var(--primary); }

        #statusText { opacity: 0.5; font-size: 10px; margin: 10px 0 30px; text-transform: uppercase; letter-spacing: 2px; }

        .key-display { 
            background: rgba(0, 0, 0, 0.6); padding: 22px; border-radius: 20px; margin-bottom: 20px; 
            font-size: 14px; color: var(--primary); font-family: 'Courier New', monospace;
            border: 1px solid rgba(0, 255, 163, 0.15); position: relative; overflow: hidden;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.5);
        }

        #timer { font-size: 11px; color: #ff4a4a; margin-bottom: 20px; font-weight: 600; letter-spacing: 1px; display: none; }

        button { 
            background: #ffffff; color: #000; border: none; padding: 18px; border-radius: 16px; 
            font-weight: 900; width: 100%; font-size: 13px; text-transform: uppercase; cursor: pointer; 
            transition: all 0.3s; box-shadow: 0 4px 15px rgba(255,255,255,0.1);
        }

        button:active { transform: scale(0.97); }
        button:disabled { background: #111; color: #333; box-shadow: none; cursor: default; }

        button.ready { background: var(--primary); box-shadow: 0 0 20px rgba(0, 255, 163, 0.3); }
    </style>
</head>
<body>
    <div class="glass-card">
        <h2>DANIIL PRO</h2>
        <div id="statusText"><span class="status-dot"></span> <span id="st">System Booting...</span></div>
        
        <div class="key-display" id="keyBox">•••• •••• •••• ••••</div>
        
        <div id="timer">EXPIRES IN: <span id="timeLeft">00:00:00</span></div>
        
        <button id="mainBtn" disabled onclick="generateFlow()">Initialize Key</button>
    </div>

    <script>
        const API = "https://script.google.com/macros/s/AKfycbx46m49ht_d_30fHruJeu4O7Nxu-L6qz_cR8LjOcWUH5gyYdvMDrPOOnl0ttCvdd4Uf/exec";
        let countdownInterval;

        function getID() {
            return btoa([navigator.hardwareConcurrency||8, navigator.deviceMemory||4, screen.width+"x"+screen.height, navigator.platform].join('|')).replace(/[/+=]/g, ""); 
        }

        window.onload = async () => {
            const id = getID();
            try {
                const res = await fetch(`${API}?action=check_device&device=${id}&_t=${Date.now()}`);
                const result = await res.text();
                
                if (result.includes("_")) { // Если пришел формат Ключ_Время
                    const parts = result.split("_");
                    showKey(parts[0], parseInt(parts[1]));
                } else {
                    document.getElementById('st').innerText = "Device Authorized";
                    document.getElementById('mainBtn').disabled = false;
                    document.getElementById('mainBtn').classList.add('ready');
                }
            } catch(e) { document.getElementById('st').innerText = "Sync Error"; }
        };

        async function generateFlow() {
            const btn = document.getElementById('mainBtn');
            btn.disabled = true; btn.innerText = "Generating...";
            const id = getID();
            try {
                const res = await fetch(`${API}?device=${id}&_t=${Date.now()}`);
                const result = await res.text();
                const parts = result.split("_");
                showKey(parts[0], parseInt(parts[1]));
            } catch (e) { btn.innerText = "Error"; }
        }

        function showKey(k, timestamp) {
            document.getElementById('keyBox').innerText = k;
            document.getElementById('st').innerText = "Access Granted";
            const btn = document.getElementById('mainBtn');
            btn.disabled = false; btn.innerText = "Copy to Clipboard";
            btn.classList.remove('ready');
            btn.onclick = () => {
                navigator.clipboard.writeText(k);
                btn.innerText = "Copied!";
                setTimeout(() => btn.innerText = "Copy to Clipboard", 1500);
            };
            startTimer(timestamp);
        }

        function startTimer(createdTime) {
            const timerDiv = document.getElementById('timer');
            const timeSpan = document.getElementById('timeLeft');
            timerDiv.style.display = "block";
            
            if(countdownInterval) clearInterval(countdownInterval);
            
            countdownInterval = setInterval(() => {
                const now = Date.now();
                const diff = (createdTime + 43200000) - now;
                
                if (diff <= 0) {
                    clearInterval(countdownInterval);
                    location.reload();
                    return;
                }
                
                const h = Math.floor(diff / 3600000);
                const m = Math.floor((diff % 3600000) / 60000);
                const s = Math.floor((diff % 60000) / 1000);
                timeSpan.innerText = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
            }, 1000);
        }
    </script>
</body>
</html>
