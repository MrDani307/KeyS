<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Daniil | Account System</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { background: #050505; color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .glass-card { 
            background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            padding: 30px; border-radius: 28px; border: 1px solid rgba(255, 255, 255, 0.08); 
            text-align: center; width: 90%; max-width: 340px;
        }
        .key-display { 
            background: rgba(0, 0, 0, 0.5); padding: 15px; border-radius: 12px; margin: 15px 0; 
            font-size: 14px; color: #00ffa3; word-break: break-all; border: 1px solid rgba(0, 255, 163, 0.1);
            min-height: 50px; display: flex; align-items: center; justify-content: center;
        }
        input {
            width: 100%; padding: 14px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.05); color: white; margin-bottom: 15px; text-align: center;
        }
        button { 
            background: #fff; color: #000; border: none; padding: 15px; border-radius: 12px; 
            font-weight: 800; width: 100%; cursor: pointer; transition: 0.2s;
        }
        button:disabled { background: #222; color: #555; }
    </style>
</head>
<body>
    <div class="glass-card">
        <h2 style="margin-top:0">DANIIL KEYS</h2>
        <input type="text" id="nickInput" placeholder="Enter Nickname (e.g. Daniil)">
        <div class="key-display" id="keyBox">READY</div>
        <button id="btn" onclick="handle()">Get Key</button>
    </div>

    <script>
        const API = "https://script.google.com/macros/s/AKfycbx46m49ht_d_30fHruJeu4O7Nxu-L6qz_cR8LjOcWUH5gyYdvMDrPOOnl0ttCvdd4Uf/exec";
        
        async function handle() {
            const nick = document.getElementById('nickInput').value.trim();
            const btn = document.getElementById('btn');
            const box = document.getElementById('keyBox');
            
            if(nick.length < 3) return alert("Nickname too short!");
            
            btn.disabled = true;
            btn.innerText = "Processing...";
            
            try {
                // Мы отправляем ник как "device", чтобы не менять скрипт сильно
                const res = await fetch(`${API}?device=${nick}&_t=${Date.now()}`);
                const key = await res.text();
                box.innerText = key;
                setupCopy(key);
            } catch(e) { 
                btn.disabled = false; btn.innerText = "Error"; 
            }
        }

        function setupCopy(k) {
            const btn = document.getElementById('btn');
            btn.disabled = false; btn.innerText = "Copy Key";
            btn.onclick = () => {
                navigator.clipboard.writeText(k);
                btn.innerText = "Copied!";
                setTimeout(() => btn.innerText = "Copy Key", 1500);
            };
        }
    </script>
</body>
</html>
