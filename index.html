<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>sKillAura | Key System</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { background: #050505; color: white; font-family: 'Segoe UI', Roboto, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        .glass-card { 
            background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            padding: 40px 25px; border-radius: 32px; border: 1px solid rgba(255, 255, 255, 0.08); 
            text-align: center; width: 90%; max-width: 350px; box-shadow: 0 25px 50px rgba(0,0,0,0.9);
        }
        h2 { font-weight: 700; letter-spacing: 3px; margin: 0 0 8px 0; font-size: 28px; text-transform: uppercase; }
        #statusText { opacity: 0.5; font-size: 12px; margin-bottom: 30px; text-transform: uppercase; letter-spacing: 1px; }
        .key-display { 
            background: rgba(0, 0, 0, 0.5); padding: 22px; border-radius: 18px; margin-bottom: 25px; 
            font-size: 17px; color: #00ffa3; font-family: 'Courier New', monospace; border: 1px solid rgba(0, 255, 163, 0.15);
            min-height: 65px; display: flex; align-items: center; justify-content: center; word-break: break-all;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);
        }
        button { 
            background: #ffffff; color: #000000; border: none; padding: 18px; border-radius: 14px; 
            font-weight: 800; width: 100%; font-size: 14px; text-transform: uppercase; cursor: pointer; 
            transition: transform 0.1s, background 0.2s;
        }
        button:active { transform: scale(0.96); background: #e0e0e0; }
        button:disabled { background: #1a1a1a; color: #444; cursor: not-allowed; }
        #timer { margin-top: 18px; font-size: 11px; color: #ff4a4a; font-weight: 600; display: none; text-transform: uppercase; }
    </style>
</head>
<body>

    <div class="glass-card">
        <h2>sKillAura</h2>
        <div id="statusText">Connecting to server...</div>
        <div class="key-display" id="keyDisplay">••••••••••</div>
        <button id="mainBtn" disabled onclick="generateFlow()">Get Key</button>
        <div id="timer">Expires in: <span id="timeLeft"></span></div>
    </div>

    <script>
        // Твоя актуальная ссылка
        const API_URL = "https://script.google.com/macros/s/AKfycbx46m49ht_d_30fHruJeu4O7Nxu-L6qz_cR8LjOcWUH5gyYdvMDrPOOnl0ttCvdd4Uf/exec";
        
        window.onload = checkStatus;

        async function getIP() {
            try {
                const res = await fetch('https://api.ipify.org?format=json');
                const data = await res.json();
                return data.ip;
            } catch (e) {
                return "unknown";
            }
        }

        async function checkStatus() {
            const btn = document.getElementById('mainBtn');
            const display = document.getElementById('keyDisplay');
            const status = document.getElementById('statusText');

            try {
                const ip = await getIP();
                // Добавляем случайный параметр, чтобы избежать старого кэша браузера
                const response = await fetch(`${API_URL}?action=generate&ip=${ip}&_t=${Date.now()}`);
                const result = await response.text();

                if (result.startsWith("exists_")) {
                    const parts = result.split("_");
                    const activeKey = parts[1] + "_" + parts[2]; 
                    const remaining = parseInt(parts[3]);

                    status.innerText = "Active key found";
                    display.innerText = activeKey;
                    setupCopyMode(activeKey);
                    startTimer(Date.now() + remaining);
                } else {
                    status.innerText = "Ready to generate";
                    display.innerText = "READY";
                    btn.disabled = false;
                    btn.innerText = "Get Key";
                }
            } catch (e) {
                status.innerText = "Connection Error";
                console.error(e);
            }
        }

        async function generateFlow() {
            const btn = document.getElementById('mainBtn');
            const display = document.getElementById('keyDisplay');
            const status = document.getElementById('statusText');
            
            btn.disabled = true;
            btn.innerText = "Processing...";

            try {
                const ip = await getIP();
                const response = await fetch(`${API_URL}?action=generate&ip=${ip}&_t=${Date.now()}`);
                const result = await response.text();
                
                if (result.includes("error")) {
                    status.innerText = "Server Error";
                    btn.disabled = false;
                    btn.innerText = "Try Again";
                } else {
                    display.innerText = result;
                    setupCopyMode(result);
                    startTimer(Date.now() + (12 * 60 * 60 * 1000));
                    status.innerText = "Key successfully generated";
                }
            } catch (e) {
                status.innerText = "Network Error";
                btn.disabled = false;
            }
        }

        function setupCopyMode(key) {
            const btn = document.getElementById('mainBtn');
            btn.disabled = false;
            btn.innerText = "Copy Key";
            btn.onclick = () => {
                navigator.clipboard.writeText(key).then(() => {
                    btn.innerText = "COPIED!";
                    setTimeout(() => btn.innerText = "Copy Key", 1500);
                }).catch(() => {
                    // Запасной вариант копирования для старых браузеров
                    const el = document.createElement('textarea');
                    el.value = key;
                    document.body.appendChild(el);
                    el.select();
                    document.execCommand('copy');
                    document.body.removeChild(el);
                    btn.innerText = "COPIED!";
                    setTimeout(() => btn.innerText = "Copy Key", 1500);
                });
            };
        }

        function startTimer(endTime) {
            const timerDiv = document.getElementById('timer');
            const timeSpan = document.getElementById('timeLeft');
            timerDiv.style.display = "block";
            
            const itv = setInterval(() => {
                const diff = endTime - Date.now();
                if (diff <= 0) { 
                    clearInterval(itv); 
                    location.reload(); 
                    return; 
                }
                const h = Math.floor(diff/3600000);
                const m = Math.floor((diff%3600000)/60000);
                const s = Math.floor((diff%60000)/1000);
                timeSpan.innerText = `${h}h ${m}m ${s}s`;
            }, 1000);
        }
    </script>
</body>
</html>
