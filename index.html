<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DANIIL KEY SYSTEM</title>
    <style>
        :root { --main: #00ffa3; --bg: #050505; --card: rgba(255, 255, 255, 0.03); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        
        body { 
            background: var(--bg); 
            color: white; font-family: 'Segoe UI', system-ui, sans-serif; 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; margin: 0; overflow: hidden;
        }

        /* Анимированный фон */
        body::before {
            content: ""; position: absolute; width: 300px; height: 300px;
            background: var(--main); filter: blur(150px); opacity: 0.15;
            top: -50px; left: -50px; z-index: -1; animation: move 10s infinite alternate;
        }

        @keyframes move { from { transform: translate(0,0); } to { transform: translate(100vw, 50vh); } }

        .card { 
            background: var(--card); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
            padding: 40px 25px; border-radius: 40px; border: 1px solid rgba(255, 255, 255, 0.1); 
            text-align: center; width: 92%; max-width: 360px;
            box-shadow: 0 25px 80px rgba(0,0,0,0.8);
            animation: slideUp 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }

        h1 { 
            font-weight: 900; letter-spacing: 2px; margin: 0 0 10px; font-size: 20px; 
            color: #fff; text-transform: uppercase;
        }

        .status { font-size: 10px; color: var(--main); letter-spacing: 3px; margin-bottom: 30px; opacity: 0.8; text-transform: uppercase; }

        .key-area { 
            background: rgba(0, 0, 0, 0.5); padding: 25px; border-radius: 24px; margin-bottom: 20px; 
            font-size: 15px; color: var(--main); font-family: 'monospace';
            border: 1px solid rgba(0, 255, 163, 0.1); position: relative;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);
        }

        .timer-box { font-size: 12px; color: #ff4a4a; margin-bottom: 25px; font-weight: 700; display: none; }

        button { 
            background: #fff; color: #000; border: none; padding: 20px; border-radius: 20px; 
            font-weight: 800; width: 100%; font-size: 14px; text-transform: uppercase; cursor: pointer; 
            transition: 0.3s; box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        button:active { transform: scale(0.95); opacity: 0.8; }
        button:disabled { background: #151515; color: #444; cursor: not-allowed; }
        
        .ready-btn { background: var(--main); box-shadow: 0 0 30px rgba(0, 255, 163, 0.2); }
    </style>
</head>
<body>
    <div class="card">
        <h1>DANIIL KEY SYSTEM</h1>
        <div class="status" id="stText">ПРОВЕРКА УСТРОЙСТВА...</div>
        
        <div class="key-area" id="keyDisplay">•••• •••• •••• ••••</div>
        
        <div class="timer-box" id="timer">ИСТЕКАЕТ ЧЕРЕЗ: <span id="timeLeft">00:00:00</span></div>
        
        <button id="btn" disabled onclick="start()">ПОЛУЧИТЬ КЛЮЧ</button>
    </div>

    <script>
        const API = "https://script.google.com/macros/s/AKfycbx46m49ht_d_30fHruJeu4O7Nxu-L6qz_cR8LjOcWUH5gyYdvMDrPOOnl0ttCvdd4Uf/exec";
        let timerInt;

        function getID() {
            return btoa([navigator.hardwareConcurrency||8, screen.width+"x"+screen.height, navigator.platform].join('|')).replace(/[/+=]/g, ""); 
        }

        window.onload = async () => {
            const id = getID();
            try {
                const res = await fetch(`${API}?action=check_device&device=${id}&_t=${Date.now()}`);
                const data = await res.text();
                
                if (data.includes("_")) {
                    const [key, time] = data.split("_");
                    renderKey(key, time);
                } else {
                    document.getElementById('stText').innerText = "ДОСТУП РАЗРЕШЕН";
                    const btn = document.getElementById('btn');
                    btn.disabled = false;
                    btn.classList.add('ready-btn');
                }
            } catch(e) { document.getElementById('stText').innerText = "ОШИБКА СЕТИ"; }
        };

        async function start() {
            const btn = document.getElementById('btn');
            btn.disabled = true; btn.innerText = "ГЕНЕРАЦИЯ...";
            const id = getID();
            try {
                const res = await fetch(`${API}?device=${id}&_t=${Date.now()}`);
                const data = await res.text();
                const [key, time] = data.split("_");
                renderKey(key, time);
            } catch (e) { btn.innerText = "ОШИБКА"; btn.disabled = false; }
        }

        function renderKey(k, t) {
            document.getElementById('keyDisplay').innerText = k;
            document.getElementById('stText').innerText = "КЛЮЧ АКТИВИРОВАН";
            const btn = document.getElementById('btn');
            btn.disabled = false; btn.innerText = "СКОПИРОВАТЬ";
            btn.classList.remove('ready-btn');
            btn.onclick = () => {
                navigator.clipboard.writeText(k);
                btn.innerText = "СКОПИРОВАНО!";
                setTimeout(() => btn.innerText = "СКОПИРОВАТЬ", 1500);
            };
            runTimer(t);
        }

        function runTimer(startT) {
            const box = document.getElementById('timer');
            const span = document.getElementById('timeLeft');
            if (!startT || isNaN(startT)) return;
            
            box.style.display = "block";
            if(timerInt) clearInterval(timerInt);
            
            timerInt = setInterval(() => {
                const diff = (Number(startT) + 43200000) - Date.now();
                if (diff <= 0) { clearInterval(timerInt); location.reload(); return; }
                
                const h = Math.floor(diff / 3600000);
                const m = Math.floor((diff % 3600000) / 60000);
                const s = Math.floor((diff % 60000) / 1000);
                span.innerText = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
            }, 1000);
        }
    </script>
</body>
</html>
