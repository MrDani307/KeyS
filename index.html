<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sKillAura | Key System</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: #050505; color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .glass-card { 
            background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            padding: 40px 30px; border-radius: 30px; border: 1px solid rgba(255, 255, 255, 0.05); 
            text-align: center; width: 90%; max-width: 360px; box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }
        h2 { font-weight: 600; letter-spacing: 2px; margin: 0 0 5px 0; font-size: 26px; }
        p { opacity: 0.4; font-size: 13px; margin-bottom: 25px; text-transform: uppercase; }
        .key-display { 
            background: rgba(0, 0, 0, 0.4); padding: 20px; border-radius: 15px; margin-bottom: 25px; 
            font-size: 18px; color: #00ffa3; font-family: monospace; border: 1px solid rgba(0, 255, 163, 0.1);
            min-height: 65px; display: flex; align-items: center; justify-content: center;
        }
        button { 
            background: #fff; color: #000; border: none; padding: 16px; border-radius: 12px; 
            font-weight: 800; width: 100%; font-size: 14px; text-transform: uppercase; cursor: pointer;
        }
        button:disabled { background: #333; color: #777; }
        #timer { margin-top: 15px; font-size: 12px; color: #ff4a4a; display: none; }
    </style>
</head>
<body>

    <div class="glass-card">
        <h2>sKillAura</h2>
        <p>Key expires in 12 hours</p>
        <div class="key-display" id="keyDisplay">NOT GENERATED</div>
        <button id="mainBtn" onclick="generateFlow()">Get Key</button>
        <div id="timer">Cooldown: <span id="timeLeft"></span></div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbx46m49ht_d_30fHruJeu4O7Nxu-L6qz_cR8LjOcWUH5gyYdvMDrPOOnl0ttCvdd4Uf/exec";
        const cooldownTime = 12 * 60 * 60 * 1000;

        window.onload = checkExistingKey;

        async function getIP() {
            const res = await fetch('https://api.ipify.org?format=json');
            const data = await res.json();
            return data.ip;
        }

        async function generateFlow() {
            const btn = document.getElementById('mainBtn');
            const display = document.getElementById('keyDisplay');
            btn.disabled = true;
            btn.innerText = "Checking...";

            try {
                const ip = await getIP();
                const response = await fetch(API_URL + "?action=generate&ip=" + ip);
                const result = await response.text();

                if (result.startsWith("cooldown_")) {
                    const remaining = parseInt(result.split("_")[1]);
                    alert("You already generated a key recently!");
                    startTimer(Date.now() + remaining);
                } else {
                    localStorage.setItem('skillKey', result);
                    localStorage.setItem('skillTime', Date.now());
                    display.innerText = result;
                    setupCopyMode(result);
                    startTimer(Date.now() + cooldownTime);
                }
            } catch (e) {
                alert("Server Error!");
                btn.disabled = false;
                btn.innerText = "Try Again";
            }
        }

        function checkExistingKey() {
            const savedKey = localStorage.getItem('skillKey');
            const savedTime = localStorage.getItem('skillTime');
            if (savedKey && savedTime && (Date.now() - savedTime < cooldownTime)) {
                document.getElementById('keyDisplay').innerText = savedKey;
                setupCopyMode(savedKey);
                startTimer(parseInt(savedTime) + cooldownTime);
            }
        }

        function setupCopyMode(key) {
            const btn = document.getElementById('mainBtn');
            btn.disabled = false;
            btn.innerText = "Copy Key";
            btn.onclick = () => {
                navigator.clipboard.writeText(key);
                btn.innerText = "COPIED!";
                setTimeout(() => btn.innerText = "Copy Key", 1500);
            };
        }

        function startTimer(endTime) {
            const timerDiv = document.getElementById('timer');
            const timeSpan = document.getElementById('timeLeft');
            timerDiv.style.display = "block";
            const itv = setInterval(() => {
                const diff = endTime - Date.now();
                if (diff <= 0) { clearInterval(itv); location.reload(); return; }
                const h = Math.floor(diff/3600000), m = Math.floor((diff%3600000)/60000), s = Math.floor((diff%60000)/1000);
                timeSpan.innerText = `${h}h ${m}m ${s}s`;
            }, 1000);
        }
    </script>
</body>
</html>
